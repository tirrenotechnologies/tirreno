<div class="card events-card" data-item-id="rules-presets-form">
    <form method="POST" action="{{ @BASE }}{{ 'rules' | alias }}" id="apply-rules-preset-form">
        <input type="hidden" name="token" value="{{ @CSRF }}">
        <input type="hidden" name="cmd" value="applyRulesPreset" />
        <input type="hidden" name="keyId" value="{{ @apiKeyId }}">

        <header class="card-header">
            <div class="card-header-title">{{ @rules_applyRulesPresets_form_title }}<p class="tooltip-info tooltip" title="{{ @rules_applyRulesPresets_form_title_tooltip }}"><include href="images/icons/information.svg" alt=''/></p>
            </div>
        </header>

        <div class="card-content">
            <div class="content">
                <div class="field">
                    <label class="label">{{ @rules_applyRulesPresets_form_field_label }}</label>
                    <div class="control">
                        <include href="templates/parts/rulesPresetsSelector.html" />
                    </div>
                </div>
                <div class="field">
                    <label class="label"></label>
                    <div class="control">
                        <div class="neutral-text level-right">{{ @rules_applyRulesPresets_form_field_warning }}</div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="card-footer">
            <input type="submit" class="button is-warning" id="apply-rules-preset-btn" value="{{ @rules_applyRulesPresets_form_button_save }}">
        </footer>
    </form>
</div>
